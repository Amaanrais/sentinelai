<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentinelAI — Prompt Intent Classifier</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f1a;
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
    }

    header h1 span {
      color: #7c6aff;
    }

    header p {
      margin-top: 8px;
      color: #9090b0;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 680px;
    }

    /* ── Model selector ── */
    .model-selector-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #9090b0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      display: block;
    }

    .model-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 22px;
    }

    .model-option {
      position: relative;
    }

    .model-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .model-option label {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 11px 8px 10px;
      background: #0f0f1a;
      border: 1px solid #2a2a45;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      text-align: center;
      text-transform: none;
      letter-spacing: normal;
    }

    .model-option label .model-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: #c0c0d8;
      margin-bottom: 3px;
    }

    .model-option label .model-meta {
      font-size: 0.72rem;
      color: #5a5a7a;
      line-height: 1.4;
    }

    .model-option input[type="radio"]:checked+label {
      border-color: #7c6aff;
      background: #1f1b3a;
    }

    .model-option input[type="radio"]:checked+label .model-name {
      color: #a898ff;
    }

    .model-option input[type="radio"]:checked+label .model-meta {
      color: #7a6ab8;
    }

    .model-option label:hover {
      border-color: #4a4a7a;
    }

    /* ── Prompt input ── */
    .prompt-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #9090b0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 140px;
      background: #0f0f1a;
      border: 1px solid #2a2a45;
      border-radius: 8px;
      color: #e0e0f0;
      font-size: 0.97rem;
      line-height: 1.55;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea::placeholder {
      color: #4a4a6a;
    }

    textarea:focus {
      border-color: #7c6aff;
    }

    button#analyze-btn {
      margin-top: 16px;
      width: 100%;
      padding: 13px;
      background: #7c6aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button#analyze-btn:hover:not(:disabled) {
      background: #6a58e8;
    }

    button#analyze-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Result card ── */
    #result-card {
      display: none;
      margin-top: 24px;
    }

    .result-model-tag {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #5a5a8a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .verdict {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
      padding: 10px 0 18px;
    }

    .verdict.benign {
      color: #00b894;
    }

    .verdict.malicious {
      color: #d63031;
    }

    .bar-row {
      margin-bottom: 12px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      font-weight: 600;
      color: #9090b0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    .bar-track {
      background: #0f0f1a;
      border-radius: 4px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bar-fill.benign {
      background: #00b894;
    }

    .bar-fill.malicious {
      background: #d63031;
    }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      margin-top: 16px;
      background: #2d1a1a;
      border: 1px solid #5c2020;
      border-radius: 8px;
      padding: 12px 16px;
      color: #ff7675;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 48px;
      color: #4a4a6a;
      font-size: 0.78rem;
      text-align: center;
    }
  </style>
</head>

<body>

  <header>
    <h1>Sentinel<span>AI</span></h1>
    <p>Detects malicious intent in natural language prompts.</p>
  </header>

  <div class="card">

    <!-- Model selector -->
    <span class="model-selector-label">Model</span>
    <div class="model-selector">

      <div class="model-option">
        <input type="radio" name="model" id="m-distilbert" value="distilbert_v1" checked />
        <label for="m-distilbert">
          <span class="model-name">DistilBERT v1</span>
          <span class="model-meta">256 MB · F1 0.972</span>
        </label>
      </div>

      <div class="model-option">
        <input type="radio" name="model" id="m-roberta" value="roberta_v1" />
        <label for="m-roberta">
          <span class="model-name">RoBERTa v1</span>
          <span class="model-meta">476 MB · F1 0.978</span>
        </label>
      </div>

      <div class="model-option">
        <input type="radio" name="model" id="m-baseline" value="baseline" />
        <label for="m-baseline">
          <span class="model-name">TF-IDF + LR</span>
          <span class="model-meta">0.5 MB · F1 0.946</span>
        </label>
      </div>

    </div>

    <!-- Prompt input -->
    <label class="prompt-label" for="prompt-input">Prompt</label>
    <textarea id="prompt-input" placeholder="Type or paste a prompt to analyze — e.g. &quot;How do I pick a lock?&quot;"
      maxlength="2000"></textarea>

    <button id="analyze-btn" type="button">
      <span class="spinner" id="spinner"></span>
      <span id="btn-label">Analyze Prompt</span>
    </button>

    <div id="error-banner"></div>

    <div id="result-card">
      <div class="result-model-tag" id="result-model-tag"></div>
      <div class="verdict" id="verdict-text"></div>

      <div class="bar-row">
        <div class="bar-label">
          <span>Benign</span>
          <span id="pct-benign">0%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill benign" id="bar-benign"></div>
        </div>
      </div>

      <div class="bar-row">
        <div class="bar-label">
          <span>Malicious</span>
          <span id="pct-malicious">0%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill malicious" id="bar-malicious"></div>
        </div>
      </div>
    </div>
  </div>


  <script>
    const btn = document.getElementById("analyze-btn");
    const spinner = document.getElementById("spinner");
    const btnLabel = document.getElementById("btn-label");
    const input = document.getElementById("prompt-input");
    const errBanner = document.getElementById("error-banner");
    const resultCard = document.getElementById("result-card");
    const verdictEl = document.getElementById("verdict-text");
    const resultTag = document.getElementById("result-model-tag");
    const barBenign = document.getElementById("bar-benign");
    const barMalic = document.getElementById("bar-malicious");
    const pctBenign = document.getElementById("pct-benign");
    const pctMalic = document.getElementById("pct-malicious");

    const MODEL_LABELS = {
      distilbert_v1: "DistilBERT v1",
      roberta_v1: "RoBERTa v1",
      baseline: "TF-IDF + LR (Baseline)",
    };

    function selectedModel() {
      return document.querySelector('input[name="model"]:checked').value;
    }

    function setLoading(on) {
      btn.disabled = on;
      spinner.style.display = on ? "block" : "none";
      btnLabel.textContent = on ? "Analyzing…" : "Analyze Prompt";
    }

    function showError(msg) {
      errBanner.textContent = msg;
      errBanner.style.display = "block";
      resultCard.style.display = "none";
    }

    function showResult(data) {
      errBanner.style.display = "none";
      resultCard.style.display = "block";

      resultTag.textContent = MODEL_LABELS[data.model] || data.model;
      verdictEl.textContent = data.label.toUpperCase();
      verdictEl.className = "verdict " + data.label;

      const b = Math.round(data.prob_benign * 100);
      const m = Math.round(data.prob_malicious * 100);

      barBenign.style.width = "0%";
      barMalic.style.width = "0%";
      void barBenign.offsetWidth; // force reflow for CSS transition

      requestAnimationFrame(() => {
        barBenign.style.width = b + "%";
        barMalic.style.width = m + "%";
        pctBenign.textContent = b + "%";
        pctMalic.textContent = m + "%";
      });
    }

    btn.addEventListener("click", async () => {
      const text = input.value.trim();
      const model = selectedModel();
      if (!text) { showError("Please enter a prompt before analyzing."); return; }

      setLoading(true);
      errBanner.style.display = "none";

      try {
        const res = await fetch("/classify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, model }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.detail || "Server error. Please try again.");
        } else {
          showResult(data);
        }
      } catch {
        showError("Network error — is the server running?");
      } finally {
        setLoading(false);
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) btn.click();
    });
  </script>
</body>

</html>
